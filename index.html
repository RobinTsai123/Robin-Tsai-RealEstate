<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate - Robin Tsai</title>
    
    <!-- BASE STYLES -->
    <link rel="stylesheet" href="css/base.css">
    <!-- SECTION STYLES -->
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/services.css">
    <link rel="stylesheet" href="css/projects.css">
    <link rel="stylesheet" href="css/appraisal.css">
    <!-- LOADING ANIMATION STYLES -->
    <link rel="stylesheet" href="css/loading-animation.css">
</head>
<body>
    <!-- HEADER SECTION - Logo and Navigation -->
    <header>
        <div class="container">
            <nav>
                <!-- LOGO AREA - Logo image and name -->
                <div class="logo">
                    <img src="images/PageLogo.png" alt="Real Estate Logo">
                    <div class="logo-text">
                        <h1 class="name">Robin Tsai</h1>
                    </div>
                </div>
                
                <!-- NAVIGATION MENU - Main menu items -->
                <ul class="nav-menu">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#services">My Services</a></li>
                    <li><a href="#projects">New Launch Project</a></li>
                    <li><a href="#appraisal">Appraisal</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT AREA - White content box with sections -->
    <main>
        <div class="container">
            <div class="content-area">
                <!-- Include all sections -->
                <div id="home-section"></div>
                <div id="about-section"></div>
                <div id="services-section"></div>
                <div id="projects-section"></div>
                <div id="appraisal-section"></div>
            </div>
        </div>
    </main>

    <!-- PREMIUM BLACK GRADIENT FOOTER - Bottom gradient overlay -->
    <div class="black-gradient-footer"></div>

    <!-- JAVASCRIPT FILES -->
    <script src="js/loadSections.js"></script>
    <script src="js/loading-animation.js"></script>
</body>

</html>
